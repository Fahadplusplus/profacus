<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Profacus-Login</title>

  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css" rel="stylesheet"/>
 <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css">
</head>

<body class="bg-white">

  <main class="main-layout">

    <section class="form-col d-flex flex-column px-4 px-lg-5 py-4 py-lg-5">

      <div class="logo-wrap">
        <img src="assets/Logo.png" alt="Profacus Logo" class="logo-img">
      </div>

      <form action="" class="login-form flex-grow-1 d-flex flex-column justify-content-center">

        <h2 class="fw-bold mb-1 text-center">Welcome to Profacus</h2>

        <p class="text-secondary mb-4 text-center">
          Enter your Email and Password to access your account.
        </p>

        <div class="mb-3">
          <input type="email" class="form-control" placeholder="Enter Email" />
        </div>

        <div class="mb-2">
          <input type="password" class="form-control" placeholder="Enter Password" />
        </div>

        <a href="#" class="forgot-link text-decoration-none mb-3 d-inline-block">
          Forgot Password?
        </a>

        <div class="d-flex justify-content-between align-items-center mb-4">
          <label class="text-secondary remember-text">
            Remember sign in detail
          </label>

          <div class="form-check form-switch mb-0">
            <input class="form-check-input" type="checkbox" role="switch" id="rememberMe" checked>
          </div>
        </div>

        <button type="submit" class="btn btn-purple text-white w-100 py-2 fw-semibold">
          Login
        </button>

      </form>

      <div class="footer-text text-muted d-flex flex-column">
        <span>Copyright &copy; 2026 Profacus</span>
        <strong class="text-secondary">Powered By Abacus Consulting Technology Ltd.</strong>
      </div>

    </section>

    <section class="">
      <div class="image-col">
           <img src="assets/image 1.png" alt="Person writing notes" class="cover-photo ">
      </div>
     
    </section>

  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/js/bootstrap.bundle.min.js"></script>
</body>
</html>
