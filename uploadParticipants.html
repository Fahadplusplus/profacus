<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profacus - Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <link rel="stylesheet" href="styles.css">
</head>

<body>


    <div id="sidebar-overlay"></div>

    <div class="layout-body ">


        <div id="sidebar-placeholder"></div>

        <div class="right-panel">

            <div id="navbar-placeholder"></div>
            <div class="main-content">


                <!-- Page heading -->
                <div class="mb-4">
                    <h2 class="questionTitle">Upload Participants</h2>
                    <p class="questiondes">Manage and track all employee survey participation.</p>
                </div>

                <div class="surveysteps">
                    <div class="stepcon ">
                        <a href="#" class="step active">Step 1</a>
                        <a href="#" class="step">Step 2</a>
                    </div>
                </div>
                <div class="">
                    <div class="dt-toolbar mt-5">
                        <select class="dt-select" id="statusFilter">
                            <option value="">Select Status</option>
                            <option value="Complete">Complete</option>
                            <option value="Sent">Sent</option>
                            <option value="Not Sent">Not Sent</option>
                        </select>

                        <select class="dt-select" id="entriesFilter">
                            <option value="10">Select Entries</option>
                            <option value="10">10</option>
                            <option value="25">25</option>
                            <option value="50">50</option>
                        </select>

                        <div class="spacer"></div>

                        <button class="btn-add-emp" onclick="openAddModal()">
                            <i class="bi bi-plus-lg me-1"></i> Add Employee
                        </button>
                        <button class="btn-add-all">Add All Participants</button>
                    </div>

                    <!-- Table -->
                    <div class="dt-card">
                        <table id="employeeTable">
                            <thead>
                                <tr>
                                    <th>Name</th>
                                    <th>Employee ID</th>
                                    <th>Email</th>
                                    <th>Channel</th>
                                    <th>Status</th>
                                    <th>Reminder</th>
                                    <th>Time</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="tableBody">
                                <!-- Rows injected by JS -->
                            </tbody>
                        </table>
                    </div>

                    <!-- Footer: info + pagination -->
                    <div class="dt-footer">
                        <div class="dt-info" id="tableInfo">Showing 1-10 from 50</div>
                        <ul class="dt-pagination" id="pagination"></ul>
                    </div>

                    <!-- Send Survey -->
                    <div class="dt-bottom-row">
                        <button class="btn-send-survey">Send Survey</button>
                    </div>
                </div>
                <!-- Toolbar -->


                <div class="">s;kdlknd</div>
            </div>


        </div>
    </div>

    <div id="footer-placeholder"></div>

    <!-- Add Employee Modal -->
    <div class="modal fade" id="addEmployeeModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content" style="border-radius:14px;">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title fw-700" style="font-weight:700;">Add Employee</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label fw-600" style="font-weight:600;font-size:14px;">Name</label>
                        <input type="text" class="form-control" id="modalName" placeholder="Enter name">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-600" style="font-weight:600;font-size:14px;">Employee ID</label>
                        <input type="text" class="form-control" id="modalEmpId" placeholder="e.g. p-01">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-600" style="font-weight:600;font-size:14px;">Email</label>
                        <input type="email" class="form-control" id="modalEmail" placeholder="Enter email">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-600" style="font-weight:600;font-size:14px;">Channel</label>
                        <select class="form-select" id="modalChannel">
                            <option value="NA">NA</option>
                            <option value="Email">Email</option>
                            <option value="SMS">SMS</option>
                        </select>
                    </div>
                </div>
                <div class="modal-footer border-0 pt-0">
                    <button class="btn-add-all" data-bs-dismiss="modal">Cancel</button>
                    <button class="btn-add-emp ms-2" onclick="addEmployee()">Add Employee</button>
                </div>
            </div>


        </div>
    </div>



    </div>

    </div>
    </div>

    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="sidebar.js"></script>
    <script src="dashboard.js"></script>
    <script src="table.js"></script>
    <script>
document.addEventListener('DOMContentLoaded', function () {
    // wait for content to be injected first
    window.addEventListener('sidebar-ready', function () {
        const container = document.getElementById('stepCom1');
        if (!container) return;

        const step1 = container.querySelector('.step:nth-child(1)');
        const step2 = container.querySelector('.step:nth-child(2)');
        const step1div = container.querySelector('.step1div');
        const step2div = container.querySelector('.step2div');

        if (!step1 || !step2 || !step1div || !step2div) return;

        step2div.style.display = 'none';

        step1.addEventListener('click', function (e) {
            e.preventDefault();
            step1.classList.add('active');
            step2.classList.remove('active');
            step1div.style.display = 'block';
            step2div.style.display = 'none';
        });

        step2.addEventListener('click', function (e) {
            e.preventDefault();
            step2.classList.add('active');
            step1.classList.remove('active');
            step2div.style.display = 'block';
            step1div.style.display = 'none';
        });
    });
});
</script>

</body>

</html>
