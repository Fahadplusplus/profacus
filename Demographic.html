<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profacus - Prisms</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Gabarito:wght@400;500;600;700&family=Instrument+Sans:wght@400;500;600;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="styles2.css">
</head>

<body>

    <!-- Overlay: click to close sidebar on mobile -->
    <div id="sidebar-overlay"></div>

    <div class="layout-body">
        <div id="sidebar-placeholder"></div>




        <div class="right-panel">

            <div id="navbar-placeholder"></div>

            <div class="main-content">
                <div class="mb-4">
                    <h2 class="questionTitle">Demographics</h2>
                    <p class="questiondes">Lorem Ipsum is a dummy text.....</p>
                </div>
                <hr>
                <!-- Toolbar -->
                <div class="dt-toolbar">
                    <div>
                        <div style="position: relative;">
                            <i class="bi bi-search"
                                style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); color: #21409A; pointer-events: none;"></i>
                            <input type="text" class="form-control" id="statusFilter" placeholder="Search here…" />
                        </div>
                    </div>
                    <div class="spacer"></div>

                    <div class="dropdown shadow-sm">
                        <button class="btn  dropdown-toggle  " type="button" data-bs-toggle="dropdown"
                            aria-expanded="false">
                            Select Entries
                        </button>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="#">Action</a></li>
                            <li><a class="dropdown-item" href="#">Another action</a></li>
                            <li><a class="dropdown-item" href="#">Something else here</a></li>
                        </ul>
                    </div>


                    <button class="btn-add-all">+Create Demographics</button>
                </div>

                <!-- Table -->
                <div class="dt-card">
                    <table id="employeeTable">
                        <thead>
                            <tr>
                                <th>Name</th>

                                <th>Status</th>

                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody">
                            <!-- Rows injected by JS -->
                        </tbody>
                    </table>
                </div>

                <!-- Footer: info + pagination -->
                <div class="dt-footer">
                    <div class="dt-info" id="tableInfo">Showing 1-10 from 50</div>
                    <ul class="dt-pagination" id="pagination"></ul>
                </div>

            </div>

        </div>
    </div>

    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="sidebar.js"></script>
    <script src="dashboard.js"></script>
    <script src="demographicTable.js"></script>
</body>

</html>
