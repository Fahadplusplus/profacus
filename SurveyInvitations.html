<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profacus - Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="createQuestions.css">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="styles2.css">
</head>

<body>


    <div id="sidebar-overlay"></div>

    <div class="layout-body ">


        <div id="sidebar-placeholder"></div>

        <div class="right-panel">

            <div id="navbar-placeholder"></div>
            <div class="main-content">

                <!-- Page Heading -->
                <div class="mb-4">
                    <h2 class="questionTitle">Create Questions</h2>
                    <p class="questiondes">Lorem Ipsum is a dummy text.....</p>
                </div>
                <hr>

                <div>
                    <!-- Survey Instructions Header -->
                    <div class="survey-header mt-5 ">

                        <h3 class="inviteTitle">Email Content</h3>

                    </div>
                    <div class="editor-wrapper ">


                        <img src="assets/image 2.png" class="img-fluid img rounded-top" alt="" />


                    </div>
                    <div class="survey-header mt-5 ">

                        <h3>Reminder Content</h3>

                    </div>
                    <div class="editor-wrapper mt-3">


                        <img src="assets/image 2.png" class="img-fluid img  rounded-top" alt="" />


                    </div>
                </div>
                <div class="d-flex justify-content-between align-items-center">
                    <div class="mt-4 pt-2">
                        <div style="display: flex; align-items: center; gap: 12px;">

                            <!-- Label -->
                            <label
                                style="font-size: 14px; font-weight: 600; color: #222; white-space: nowrap; display: flex; align-items: center; gap: 6px;">
                                <i class="bi bi-paperclip"></i> Attachment file:
                            </label>

                            <!-- Custom file input -->
                            <div style="position: relative; flex: 1; cursor: pointer;"
                                onclick="document.getElementById('fileUpload').click()">
                                <input type="file" id="fileUpload" style="display: none;" onchange="showFileName(this)">
                                <div class="form-control mt-3" id="fileLabel"
                                    style="color: #aaa; font-size: 14px; padding-right: 40px;">
                                    Upload here and drag the file
                                </div>
                                <i class="bi bi-upload"
                                    style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); color: #222; pointer-events: none;"></i>
                            </div>

                        </div>
                    </div>
                    <div class="">
                        <button type="button" class="nextBtn"> Save</button>
                    </div>

                </div>



            </div>

        </div>
    </div>

    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="sidebar.js"></script>
    <script src="dashboard.js"></script>
    <script src="step3.js"></script>
</body>

</html>
