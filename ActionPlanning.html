<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profacus - Prisms</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Gabarito:wght@400;500;600;700&family=Instrument+Sans:wght@400;500;600;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <!-- Overlay: click to close sidebar on mobile -->
    <div id="sidebar-overlay"></div>

    <div class="layout-body">
        <div id="sidebar-placeholder"></div>




        <div class="right-panel">

            <div id="navbar-placeholder"></div>

            <div class="main-content">
                <div class="mb-4">
                    <h2 class="questionTitle">Action Planning</h2>
                    <p class="questiondes">Lorem Ipsum is simply dummy text of the printing and typesetting industry.
                    </p>
                </div>
                <hr>
                <div class="dt-toolbar">

                    <div class="spacer"></div>

                    <div class="dropdown">
                        <button class="btn  dropdown-toggle shadow-sm  " type="button" data-bs-toggle="dropdown"
                            aria-expanded="false">
                            Select Entries
                        </button>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="#">Action</a></li>
                            <li><a class="dropdown-item" href="#">Another action</a></li>
                            <li><a class="dropdown-item" href="#">Something else here</a></li>
                        </ul>
                    </div>


                    <button class="btn-add-all">+ Add Action</button>
                </div>
                <div class="dt-card mt-4">
                    <table id="testPlanTable">
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Dimensions</th>
                                <th>Statements</th>
                                <th>Status</th>
                                <th>Completion Percentage</th>
                                <th>Completion Date</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="testPlanBody">
                            <!-- Rows injected by JS -->
                        </tbody>
                    </table>
                </div>

                <div class="dt-footer">
                    <div class="dt-info" id="testPlanInfo">Showing 1-10 from 50</div>
                    <ul class="dt-pagination" id="testPlanPagination"></ul>
                </div>

            </div>
        </div>
    </div>

    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="sidebar.js"></script>
    <script src="dashboard.js"></script>
    <script src="planningTable.js"></script>
</body>

</html>
