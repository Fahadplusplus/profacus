<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profacus - Prisms</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Gabarito:wght@400;500;600;700&family=Instrument+Sans:wght@400;500;600;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <!-- Overlay: click to close sidebar on mobile -->
    <div id="sidebar-overlay"></div>

    <div class="layout-body">
        <div id="sidebar-placeholder"></div>




        <div class="right-panel">

            <div id="navbar-placeholder"></div>

            <div class="main-content">

                <div class="mb-4">
                    <h2 class="questionTitle">Participation</h2>
                    <p class="questiondes">Lorem ipsum is a dummy text to solar....
                    </p>
                </div>
                <hr>
                <div class="dt-toolbar">

                    <div class="spacer"></div>

                    <div class="dropdown">
                        <button class="btn  dropdown-toggle shadow-sm  " type="button" data-bs-toggle="dropdown"
                            aria-expanded="false">
                            Select Entries
                        </button>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="#">Action</a></li>
                            <li><a class="dropdown-item" href="#">Another action</a></li>
                            <li><a class="dropdown-item" href="#">Something else here</a></li>
                        </ul>
                    </div>


                    <button class="btn-add-all">+ Add Action</button>
                </div>
             <div class="row g-3">

    <!-- Completed Donut Card -->
    <div class="col-12 col-lg-5">
        <div class="completed-card">
            <h2 class="completed-label">Completed</h2>
            <div class="donut-wrap">
                <div id="completedDonut"></div>
                <div class="donut-center-text" id="donutCenterText">93%</div>
            </div>
        </div>
    </div>

    <!-- Right side: Total bar + stat cards -->
    <div class="col-12 col-lg-7">
        <div class="row g-3 h-100">

            <div class="col-12">
                <div class="stat-card">
                    <h2 class="completed-label">Total</h2>
                    <div class="d-flex align-items-baseline justify-content-end mb-3">
                        <span class="stat-big">295</span>
                        <span class="stat-small">/327</span>
                    </div>
                    <div class="progress-track-lg">
                        <div class="progress-fill-lg" style="width:90%;"></div>
                        <div class="progress-handle" style="left:90%;"></div>
                    </div>
                </div>
            </div>

            <div class="col-6">
                <div class="stat-card">
                    <p class="stat-label">Today</p>
                    <span class="stat-number">0</span>
                </div>
            </div>

            <div class="col-6">
                <div class="stat-card">
                    <p class="stat-label">Past Hours</p>
                    <span class="stat-number">295</span>
                </div>
            </div>

        </div>
    </div>

</div>

            </div>
        </div>
    </div>

    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="sidebar.js"></script>
    <script src="dashboard.js"></script>
   
    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>
    <script src="https://code.highcharts.com/themes/adaptive.js"></script>

     <script src="donatchart.js"></script>
</body>

</html>
